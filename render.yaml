services:
  - type: web
    name: b3-penny-stock-analyzer-api
    runtime: node
    buildCommand: npm install --include=dev && pip3 install -r requirements.txt
    startCommand: npm run server
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGIN
        sync: false   # Preencher com a URL do Vercel após o deploy do frontend
